<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 折线图 -->
  <polyline
    points="80,380 180,340 260,360 340,200 400,140 432,160"
    fill="none"
    stroke="url(#accent)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- 数据点 -->
  <circle cx="340" cy="200" r="22" fill="#e74c3c" opacity="0.9"/>
  <circle cx="400" cy="140" r="22" fill="#ff6b6b" opacity="0.9"/>
  <!-- 坐标轴 -->
  <line x1="60" y1="400" x2="460" y2="400" stroke="#8892b0" stroke-width="6" stroke-linecap="round"/>
  <line x1="60" y1="80" x2="60" y2="400" stroke="#8892b0" stroke-width="6" stroke-linecap="round"/>
  <!-- LOF 文字 -->
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="64" font-weight="900" fill="#4dabf7" letter-spacing="8">LOF</text>
</svg>
